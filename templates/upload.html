{% extends "base.html" %}

{% block title %}Upload Image{% endblock %}

{% block content %}
    <h1 class="hero-title">🕰 Chronicle</h1>
    <p class="hero-subtitle">Your Story in Time</p>

    <div class="glass-container">
    <form id="uploadForm" enctype="multipart/form-data">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required />

        <label for="tags">Tags (comma-separated)</label>
        <input type="text" id="tags" name="tags" placeholder="tag1, tag2" />
        
        <label for="date">Date</label>
        <input type="date" id="date" name="date" />

        <label for="imageInput" class="upload-box">📷 Drag & Drop or Click to Upload Your Journal Image</label>
        <input type="file" id="imageInput" name="image" accept="image/*" required />
        
        <!-- Submit button -->
        <button type="submit">Upload & Add to Timeline</button>
    </form>
    
    <!-- Preview image (optional) -->
    <img id="imagePreview" />
    <p id="uploadStatus"></p>
    </div>
    
    <script>
        // Preview image before uploading
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('imagePreview').src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // Handle form submission
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (response.ok) {
                    document.getElementById('uploadStatus').textContent = result.message;
                    // Redirect to image detail page
                    setTimeout(() => {
                        window.location.href = `/image/${result.filename}`;
                    }, 500);
                } else {
                    document.getElementById('uploadStatus').textContent = 'Error: ' + result.message;
                }
            } catch (error) {
                document.getElementById('uploadStatus').textContent = 'Error: ' + error;
            }
        });


    </script>
{% endblock %}
